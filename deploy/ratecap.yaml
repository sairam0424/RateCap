sync_rate: 5
tiers:
  rate_limiter:
    default_rate: 2
    default_burst: 5
    shadow_mode: false
  concurrency_limiter:
    default_max_concurrent: 3
    max_request_duration_ms: 30000
    shadow_mode: false
    # Bounded queueing (v2 Phase 3) — off by default, uncomment to enable:
    # queueing_enabled: true
    # max_backlog: 20
    # max_queue_wait_ms: 2000
    # poll_interval_ms: 25
  fleet_shedder:
    default_max_concurrent: 5
    reserved_critical_pct: 40
    max_request_duration_ms: 30000
    default_priority: sheddable
    shadow_mode: false
